<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" role="img" aria-labelledby="title desc">
  <title id="title">Financial Times logo</title>
  <desc id="desc">A simple Financial Times wordmark on a pale pink background.</desc>
  <rect width="400" height="225" rx="20" fill="#fff1e5"/>
  <g fill="#262626">
    <rect x="64" y="54" width="272" height="117" rx="4" fill="#fff7ef" stroke="#e2c9b8" stroke-width="2"/>
    <text x="200" y="105" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">FT</text>
    <text x="200" y="143" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Financial Times</text>
  </g>
</svg>
